name: Daily journalism monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate daily report
        run: |
          python3 --version
          python3 scripts/monitor_journalism.py

      - name: Commit generated report and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/monitoreo-redes-sociales-*.md docs/*.html docs/*.css docs/reports/*.html
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Add daily journalism monitoring report"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
